<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skandan | Computing</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* The Animated Breathing Background */
        .animated-bg {
            position: fixed;
            top: -5%; left: -5%;
            width: 110vw; height: 110vh;
            background-image: url('Assets/background.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            animation: breathe 20s infinite alternate ease-in-out; 
        }

        @keyframes breathe {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }

        /* The Main Header Text */
        .hero-text {
            text-align: center;
            margin-bottom: 50px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .hero-text h1 {
            font-size: 3.5em;
            margin: 0 0 10px 0;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .hero-text p {
            font-size: 1.2em;
            margin: 5px 0;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
        }

        /* The Side-by-Side Flexbox Container */
        .dock-container {
            display: flex;
            flex-direction: row;
            gap: 20px;
        }

        /* The Hover-Expanding Islands */
        .island-link {
            /* Glassmorphism Styling */
            background: rgba(80, 80, 85, 0.35);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            
            /* The Starting Shape (Small Circle) */
            width: 65px;
            height: 65px;
            border-radius: 50px;
            
            text-decoration: none; /* Removes the default blue link underline */
            color: white;
            display: flex;
            align-items: center;
            overflow: hidden; /* Keeps text hidden when collapsed */
            
            /* The Spring Animation */
            transition: all 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }

        /* What happens when you hover over it */
        .island-link:hover {
            width: 220px; /* Expands horizontally into a pill */
            background: rgba(100, 100, 105, 0.5);
            transform: translateY(-3px); /* Floats up slightly */
        }

        /* The Icon that always shows */
        .icon {
            min-width: 65px; /* Keeps the icon perfectly centered in the circle */
            text-align: center;
            font-size: 1.5em;
        }

        /* The Text that reveals on hover */
        .label {
            font-size: 1.1em;
            font-weight: 500;
            white-space: nowrap; /* Prevents text from stacking vertically */
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .island-link:hover .label {
            opacity: 1;
            transform: translateX(0);
            transition-delay: 0.1s; /* Waits a split second for the pill to expand first */
        }
    </style>
</head>
<body>

    <div class="animated-bg"></div>

    <div class="hero-text">
        <h1>Skandan</h1>
        <p>Computing @ ANU</p>
        <p style="font-size: 0.95em; opacity: 0.8;">Cyber Security • Intelligent Systems • Finance</p>
    </div>

    <div class="dock-container">
        
        <a href="about.html" class="island-link">
            <span class="icon">👤</span>
            <span class="label">About Me</span>
        </a>

        <a href="projects/nids.html" class="island-link">
            <span class="icon">🛡️</span>
            <span class="label">NIDS Project</span>
        </a>

        <a href="https://github.com/skandan" target="_blank" class="island-link">
            <span class="icon">💻</span>
            <span class="label">GitHub</span>
        </a>

    </div>

</body>
</html>
